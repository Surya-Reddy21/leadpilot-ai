version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: leadpilot
      POSTGRES_USER: leadpilot
      POSTGRES_PASSWORD: leadpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 5000
      DATABASE_URL: postgres://leadpilot:leadpilot@db:5432/leadpilot
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
